site_name: Arquitetura de Soluções com IA Generativa
site_description: Livro-texto da disciplina de pós-graduação em Arquitetura de Soluções com IA Generativa

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Início: index.md
  - Começar:
      - Sobre a disciplina: comecar/sobre-a-disciplina.md
      - Como usar: comecar/como-usar.md
      - Mapa de aprendizagem: comecar/mapa-de-aprendizagem.md
      - Taxonomia de Bloom: comecar/taxonomia-de-bloom.md
  - Referência:
      - Glossário: referencia/glossario.md
      - Catálogo de padrões: referencia/catalogo-de-padroes.md
      - Atributos de qualidade: referencia/atributos-de-qualidade.md
      - Template de ADR: referencia/template-adr.md
      - Método de referências: referencia/metodo-de-referencias.md
      - Bibliografia consolidada: referencia/bibliografia.md
  - Sobre:
      - Plano da disciplina: sobre/plano-da-disciplina.md
