site_name: Arquitetura de Soluções com IA Generativa
site_description: Livro-texto da disciplina de pós-graduação em Arquitetura de Soluções com IA Generativa
# `site_url` será definido somente após a criação do repositório público.
# Os caminhos relativos mantêm a prévia e a publicação portáteis até lá.
use_directory_urls: true

theme:
  name: material
  language: pt-BR
  font: false
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mermaid.mjs

hooks:
  - course_semantics.py

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Início: index.md
  - Começar:
      - Sobre a disciplina: comecar/sobre-a-disciplina.md
      - Como usar: comecar/como-usar.md
      - Mapa de aprendizagem: comecar/mapa-de-aprendizagem.md
      - Taxonomia de Bloom: comecar/taxonomia-de-bloom.md
  - Módulo 1 — Fundamentos:
      - Visão geral: modulo-1-fundamentos/index.md
      - Conceitos: modulo-1-fundamentos/conceitos.md
      - Padrões e decisões: modulo-1-fundamentos/padroes-e-decisoes.md
      - Exemplo arquitetural: modulo-1-fundamentos/exemplo-arquitetural.md
      - Estudo de caso: modulo-1-fundamentos/estudo-de-caso.md
      - Exercícios: modulo-1-fundamentos/exercicios.md
      - Síntese e referências: modulo-1-fundamentos/sintese-e-referencias.md
  - Módulo 2 — Desenho conceitual:
