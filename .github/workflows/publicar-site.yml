name: Publicar site no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Obter o conteúdo do repositório
        uses: actions/checkout@v4

      - name: Preparar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Instalar as dependências
        run: pip install -r requirements.txt

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Executar os testes
        run: python -m unittest discover -s tests -v

      - name: Validar conteúdo completo
        run: python scripts/validate_content.py --all

      - name: Construir o site
        run: mkdocs build --strict

      - name: Preparar o site para publicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
